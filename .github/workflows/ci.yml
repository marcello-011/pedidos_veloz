name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint - pedidos
        run: cd pedidos && npm install && npm run lint

      - name: Lint - pagamentos
        run: cd pagamentos && npm install && npm run lint

      - name: Lint - estoque
        run: cd estoque && npm install && npm run lint

      - name: Lint - gateway
        run: cd gateway && npm install && npm run lint

      - name: Test - pedidos
        run: cd pedidos && npm test

      - name: Test - pagamentos
        run: cd pagamentos && npm test

      - name: Test - estoque
        run: cd estoque && npm test

      - name: Test - gateway
        run: cd gateway && npm test

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build e Push imagens
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        run: |
          docker compose build
          docker tag pedidos:1.0.0 ghcr.io/arthurreleven/pedidos:1.0.0
          docker tag pagamentos:1.0.0 ghcr.io/arthurreleven/pagamentos:1.0.0
          docker tag estoque:1.0.0 ghcr.io/arthurreleven/estoque:1.0.0
          docker tag gateway:1.0.0 ghcr.io/arthurreleven/gateway:1.0.0
          docker push ghcr.io/arthurreleven/pedidos:1.0.0
          docker push ghcr.io/arthurreleven/pagamentos:1.0.0
          docker push ghcr.io/arthurreleven/estoque:1.0.0
          docker push ghcr.io/arthurreleven/gateway:1.0.0